<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Mix - Catálogo Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fdf2f8; padding-bottom: 120px; }
        
        .pink-gradient { background: linear-gradient(135deg, #f472b6, #db2777); }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
        
        .category-btn.active { background: #db2777; color: white; border-color: #db2777; box-shadow: 0 4px 12px rgba(219, 39, 119, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; }
        
        /* Animação do Badge do Carrinho */
        #cart-count { animation: pop 0.3s ease-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .product-card { transition: transform 0.2s, opacity 0.3s; }
    </style>
</head>
<body>

    <header class="pink-gradient pt-10 pb-20 text-center relative overflow-hidden shadow-lg">
        <div class="w-28 h-28 bg-black rounded-full mx-auto border-4 border-white overflow-hidden mb-3 relative z-20 shadow-2xl">
            <img src="https://i.ibb.co/JMx6RKd/1000959503.jpg" class="w-full h-full object-cover">
        </div>
        
        <h1 class="text-white text-xl font-black uppercase tracking-widest relative z-20">Shopping Mix</h1>
        <p class="text-pink-100 text-[10px] font-bold tracking-[0.2em] uppercase relative z-20 mb-6">Consultoria de Beleza • Ipuã</p>

        <div class="px-6 mb-6 relative z-20">
            <div class="relative max-w-md mx-auto">
                <input type="text" id="search-input" onkeyup="filterProducts()" placeholder="O que você procura hoje?" 
                class="w-full py-3 px-12 rounded-2xl border-none shadow-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm text-gray-700">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-pink-400"></i>
            </div>
        </div>

        <div class="px-6 flex justify-center gap-3 relative z-20">
            <a href="https://www.instagram.com/shopmixipua/" target="_blank" 
               class="glass px-5 py-2 rounded-2xl shadow-md flex items-center gap-2 hover:scale-105 transition active:scale-95">
                <i class="fa-brands fa-instagram text-pink-600 text-lg"></i>
                <span class="text-[10px] font-black uppercase text-pink-900">Instagram</span>
            </a>
            <a href="https://wa.me/5516999999999?text=Oi! Gostaria de uma consultoria personalizada." 
               class="glass px-5 py-2 rounded-2xl shadow-md flex items-center gap-2 hover:scale-105 transition active:scale-95">
                <i class="fa-brands fa-whatsapp text-green-600 text-lg"></i>
                <span class="text-[10px] font-black uppercase text-pink-900">Consultoria</span>
            </a>
        </div>
        
        <div class="absolute bottom-0 left-0 w-full h-12 bg-[#fdf2f8]" style="border-radius: 50% 50% 0 0 / 100% 100% 0 0; transform: scaleX(1.5);"></div>
    </header>

    <main class="px-6 -mt-4 relative z-30">
        
        <div class="flex gap-2 overflow-x-auto pb-6 no-scrollbar">
            <button onclick="filterCategory('todos', this)" class="category-btn active border border-pink-200 text-pink-600 px-6 py-2 rounded-2xl text-xs font-bold whitespace-nowrap transition-all">✨ Todos</button>
            <button onclick="filterCategory('pele', this)" class="category-btn border border-pink-200 text-pink-600 px-6 py-2 rounded-2xl text-xs font-bold whitespace-nowrap transition-all">🧴 Pele</button>
            <button onclick="filterCategory('olhos', this)" class="category-btn border border-pink-200 text-pink-600 px-6 py-2 rounded-2xl text-xs font-bold whitespace-nowrap transition-all">👁️ Olhos</button>
            <button onclick="filterCategory('perfume', this)" class="category-btn border border-pink-200 text-pink-600 px-6 py-2 rounded-2xl text-xs font-bold whitespace-nowrap transition-all">🌸 Perfumes</button>
        </div>

        <div id="product-list" class="space-y-4">
            
            <div class="product-card bg-white p-3 rounded-3xl shadow-sm flex items-center border border-pink-50" data-name="base matte shop mix ipua" data-category="pele">
                <div class="w-20 h-20 rounded-2xl bg-pink-50 flex-shrink-0 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1596704017254-9b121068fb31?w=200" class="w-full h-full object-cover">
                </div>
                <div class="ml-4 flex-1">
                    <h3 class="font-black text-sm text-gray-800">Base Matte Shop Mix</h3>
                    <p class="text-pink-600 font-bold text-xs mb-2">R$ 49,90</p>
                    <div class="flex gap-2">
                        <button onclick="openVideo('https://dm0qx8t0i9gc9.cloudfront.net/watermarks/video/fN5q9hM/vertical-stock-footage-glowing-face-makeup-of-young-beautiful-woman_v_0nd8s_n_watermark_hd.mp4')" 
                                class="p-2.5 bg-gray-50 text-pink-600 rounded-xl text-xs shadow-inner active:scale-90 transition">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <button onclick="addToCart('Base Matte', 49.90)" 
                                class="flex-1 bg-pink-100 text-pink-700 text-[10px] font-black py-2.5 rounded-xl uppercase tracking-tighter active:scale-95 transition">
                            + Adicionar
                        </button>
                    </div>
                </div>
            </div>

            <div class="product-card bg-white p-3 rounded-3xl shadow-sm flex items-center border border-pink-50" data-name="paleta de sombras olhos" data-category="olhos">
                <div class="w-20 h-20 rounded-2xl bg-pink-50 flex-shrink-0 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1512496011216-36838383838388?w=200" class="w-full h-full object-cover">
                </div>
                <div class="ml-4 flex-1">
                    <h3 class="font-black text-sm text-gray-800">Paleta de Sombras</h3>
                    <p class="text-pink-600 font-bold text-xs mb-2">R$ 35,00</p>
                    <div class="flex gap-2">
                        <button onclick="openVideo('https://dm0qx8t0i9gc9.cloudfront.net/watermarks/video/fN5q9hM/vertical-stock-footage-applying-brown-eyeshadow-makeup-on-model-eye_v_b_6f__e_watermark_hd.mp4')" 
                                class="p-2.5 bg-gray-50 text-pink-600 rounded-xl text-xs shadow-inner active:scale-90 transition">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <button onclick="addToCart('Paleta Sombras', 35.00)" 
                                class="flex-1 bg-pink-100 text-pink-700 text-[10px] font-black py-2.5 rounded-xl uppercase tracking-tighter active:scale-95 transition">
                            + Adicionar
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="cart-btn" class="fixed bottom-6 right-6 z-50 hidden">
        <button onclick="toggleCartModal()" class="pink-gradient text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center relative active:scale-90 transition-all border-4 border-white">
            <i class="fa-solid fa-cart-shopping text-xl"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-black text-white text-[10px] font-bold w-7 h-7 rounded-full flex items-center justify-center border-2 border-white">0</span>
        </button>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 max-h-[85vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-xl font-black text-gray-800">Meu Carrinho</h2>
                    <p class="text-xs text-gray-400 font-bold uppercase tracking-widest">Shop Mix Ipuã</p>
                </div>
                <button onclick="toggleCartModal()" class="bg-gray-100 w-10 h-10 rounded-full text-gray-400 text-2xl flex items-center justify-center">&times;</button>
            </div>
            
            <div id="cart-items" class="space-y-4 mb-8">
                </div>
            
            <div class="border-t pt-6">
                <div class="flex justify-between font-black text-lg mb-6">
                    <span class="text-gray-500">Subtotal:</span>
                    <span id="cart-total" class="text-pink-600">R$ 0,00</span>
                </div>
                <button onclick="sendWhatsApp()" class="w-full pink-gradient text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3">
                    <i class="fa-brands fa-whatsapp text-xl"></i>
                    Finalizar Pedido
                </button>
            </div>
        </div>
    </div>

    <div id="videoModal" class="fixed inset-0 bg-black/95 hidden z-[70] flex items-center justify-center p-6">
        <button onclick="closeVideo()" class="absolute top-8 right-8 text-white text-4xl font-light">&times;</button>
        <div class="w-full max-w-sm aspect-[9/16] bg-black rounded-3xl overflow-hidden shadow-2xl border border-white/10">
             <video id="modalVideo" class="w-full h-full object-cover" controls playsinline></video>
        </div>
    </div>

    <script>
        let cart = [];
        const WHATSAPP_NUMBER = '5516999999999'; // SUBSTIRUA PELO NÚMERO DELA

        function addToCart(name, price) {
            const index = cart.findIndex(item => item.name === name);
            if (index > -1) {
                cart[index].qty++;
            } else {
                cart.push({ name, price, qty: 1 });
            }
            updateCartUI();
            
            // Notificação visual de adição
            const btn = document.getElementById('cart-btn');
            btn.classList.remove('hidden');
        }

        function updateCartUI() {
            const count = cart.reduce((acc, item) => acc + item.qty, 0);
            const total = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
            
            const itemsDiv = document.getElementById('cart-items');
            if (cart.length === 0) {
                itemsDiv.innerHTML = '<p class="text-center text-gray-400 py-10 font-bold">Seu carrinho está vazio 🛍️</p>';
                document.getElementById('cart-btn').classList.add('hidden');
            } else {
                itemsDiv.innerHTML = cart.map((item, i) => `
                    <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <div>
                            <p class="font-black text-sm text-gray-800">${item.name}</p>
                            <p class="text-[10px] text-pink-500 font-bold">${item.qty}x R$ ${item.price.toFixed(2).replace('.', ',')}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="updateQty(${i}, -1)" class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-gray-400">-</button>
                            <span class="font-bold text-sm">${item.qty}</span>
                            <button onclick="updateQty(${i}, 1)" class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-pink-600">+</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function updateQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCartModal() {
            document.getElementById('cart-modal').classList.toggle('hidden');
        }

        function filterProducts() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                if (name.includes(term)) {
                    card.classList.remove('hidden');
                    card.style.opacity = '1';
                } else {
                    card.classList.add('hidden');
                    card.style.opacity = '0';
                }
            });
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                const cardCat = card.getAttribute('data-category');
                if (cat === 'todos' || cardCat === cat) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        function sendWhatsApp() {
            let msg = "*🛒 NOVO PEDIDO - SHOP MIX IPUÃ*\n";
            msg += "----------------------------------\n\n";
            cart.forEach(item => {
                msg += `✅ *${item.qty}x* ${item.name}\n   _Subtotal: R$ ${(item.price * item.qty).toFixed(2).replace('.', ',')}_\n\n`;
            });
            msg += "----------------------------------\n";
            msg += `*TOTAL DO PEDIDO: ${document.getElementById('cart-total').innerText}*\n\n`;
            msg += "Olá! Gostaria de finalizar esse pedido e combinar a entrega. 😊";
            
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`);
        }

        function openVideo(url) {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('modalVideo');
            video.src = url;
            modal.classList.remove('hidden');
            video.play();
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('modalVideo');
            video.pause();
            video.src = "";
            modal.classList.add('hidden');
        }
    </script>
</body>
</html>
