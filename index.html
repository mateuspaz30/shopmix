<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Mix - Catálogo com Vídeo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fdf2f8; padding-bottom: 120px; }
        .pink-gradient { background: linear-gradient(135deg, #f472b6, #db2777); }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .category-btn.active { background: #db2777; color: white; border-color: #db2777; }
        
        /* Estilo para o Modal de Vídeo */
        #video-modal { z-index: 10001; }
        .video-container { position: relative; padding-bottom: 177.77%; height: 0; overflow: hidden; border-radius: 20px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <header class="pink-gradient pt-10 pb-20 text-center relative overflow-hidden shadow-lg">
        <div class="w-28 h-28 bg-black rounded-full mx-auto border-4 border-white overflow-hidden mb-3 relative z-20 shadow-2xl">
            <img src="https://i.ibb.co/JMx6RKd/1000959503.jpg" class="w-full h-full object-cover">
        </div>
        <h1 class="text-white text-xl font-black uppercase tracking-widest relative z-20">Shopping Mix</h1>
        <p class="text-pink-100 text-[10px] font-bold tracking-[0.2em] uppercase relative z-20 mb-6">tudo que você ama em um só lugar</p>

        <div class="px-6 mb-6 relative z-20">
            <div class="relative max-w-md mx-auto">
                <input type="text" id="search-input" onkeyup="filterProducts()" placeholder="O que você procura hoje?" class="w-full py-3 px-12 rounded-2xl border-none shadow-xl outline-none text-sm text-gray-700">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-pink-400"></i>
            </div>
        </div>

        <div class="px-6 flex justify-center gap-3 relative z-20">
            <a href="#" class="glass px-5 py-2 rounded-2xl shadow-md flex items-center gap-2">
                <i class="fa-brands fa-instagram text-pink-600"></i>
                <span class="text-[10px] font-black uppercase text-pink-900">Instagram</span>
            </a>
            <a href="https://wa.me/5516999999999" class="glass px-5 py-2 rounded-2xl shadow-md flex items-center gap-2 text-green-600">
                <i class="fa-brands fa-whatsapp"></i>
                <span class="text-[10px] font-black uppercase text-pink-900">WhatsApp</span>
            </a>
        </div>
        <div class="absolute bottom-0 left-0 w-full h-12 bg-[#fdf2f8]" style="border-radius: 50% 50% 0 0 / 100% 100% 0 0; transform: scaleX(1.5);"></div>
    </header>

    <main class="px-6 -mt-4 relative z-30">
        <div class="flex gap-2 overflow-x-auto pb-6 no-scrollbar">
            <button onclick="filterCategory('todos', this)" class="category-btn active border border-pink-100 bg-white text-pink-600 px-6 py-2.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm">✨ Todos</button>
            <button onclick="filterCategory('pele', this)" class="category-btn border border-pink-100 bg-white text-pink-600 px-6 py-2.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm">🧴 Pele</button>
        </div>

        <div id="product-list" class="space-y-4">
            <div class="product-card bg-white p-3 rounded-3xl shadow-sm flex items-center border border-pink-50" data-name="base matte liquida" data-category="pele vendidos">
                <img src="https://images.unsplash.com/photo-1596704017254-9b121068fb31?w=300" class="w-20 h-20 rounded-2xl object-cover">
                <div class="ml-4 flex-1">
                    <span class="bg-pink-100 text-pink-600 text-[8px] font-black px-2 py-0.5 rounded-full uppercase">Com Vídeo</span>
                    <h3 class="font-black text-sm text-gray-800 uppercase italic">Base Matte Líquida</h3>
                    <p class="text-pink-600 font-bold text-xs mb-2">R$ 49,90</p>
                    <div class="flex gap-2">
                        <button onclick="openVideo('https://www.youtube.com/embed/dQw4w9WgXcQ')" class="p-2.5 bg-pink-600 text-white rounded-xl text-xs shadow-lg animate-pulse">
                            <i class="fa-solid fa-play"></i> Ver Review
                        </button>
                        <button onclick="addToCart('Base Matte', 49.90)" class="flex-1 bg-pink-100 text-pink-700 text-[10px] font-black py-2.5 rounded-xl uppercase">+ Adicionar</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="video-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6">
        <div class="w-full max-w-sm relative">
            <button onclick="closeVideo()" class="absolute -top-12 right-0 text-white text-4xl">&times;</button>
            <div class="video-container">
                <iframe id="video-frame" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <div id="cart-btn" class="fixed bottom-6 right-6 z-50 hidden">
        <button onclick="toggleCartModal()" class="pink-gradient text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center relative border-4 border-white">
            <i class="fa-solid fa-cart-shopping text-xl"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-black text-white text-[10px] font-bold w-7 h-7 rounded-full flex items-center justify-center border-2 border-white">0</span>
        </button>
    </div>

    <script>
        let cart = [];
        const WHATSAPP_NUMBER = '5516999999999';

        // FUNÇÕES DO VÍDEO
        function openVideo(url) {
            document.getElementById('video-frame').src = url;
            document.getElementById('video-modal').classList.remove('hidden');
        }

        function closeVideo() {
            document.getElementById('video-frame').src = "";
            document.getElementById('video-modal').classList.add('hidden');
        }

        // FUNÇÕES DO CARRINHO (Suas funções originais)
        function addToCart(name, price) {
            const index = cart.findIndex(i => i.name === name);
            if (index > -1) cart[index].qty++; else cart.push({ name, price, qty: 1 });
            updateUI();
            document.getElementById('cart-btn').classList.remove('hidden');
        }

        function updateUI() {
            const total = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
            document.getElementById('cart-count').innerText = cart.reduce((acc, i) => acc + i.qty, 0);
        }

        function toggleCartModal() { /* sua lógica de fechar/abrir */ }
        function filterCategory(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.product-card').forEach(c => {
                const itemCats = c.getAttribute('data-category').split(' ');
                c.classList.toggle('hidden', cat !== 'todos' && !itemCats.includes(cat));
            });
        }
    </script>
</body>
</html>
