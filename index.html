<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Mix - Catálogo Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fdf2f8; padding-bottom: 100px; }
        .pink-gradient { background: linear-gradient(135deg, #f472b6, #db2777); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .category-btn.active { background: #db2777; color: white; }
        .hidden { display: none !important; }
        
        /* Badge do Carrinho */
        #cart-count { animation: pop 0.3s ease-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <header class="pink-gradient pt-10 pb-16 text-center relative overflow-hidden">
        <div class="w-24 h-24 bg-black rounded-full mx-auto border-4 border-white overflow-hidden mb-4 relative z-20 shadow-xl">
            <img src="https://i.ibb.co/JMx6RKd/1000959503.jpg" class="w-full h-full object-cover">
        </div>
        <h1 class="text-white text-xl font-black uppercase tracking-widest relative z-20">Shopping Mix</h1>
        
        <div class="px-6 mt-4 relative z-20">
            <div class="relative max-w-md mx-auto">
                <input type="text" id="search-input" onkeyup="filterProducts()" placeholder="O que você procura hoje?" 
                class="w-full py-3 px-12 rounded-2xl border-none shadow-lg focus:ring-2 focus:ring-pink-300 outline-none text-sm">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-pink-400"></i>
            </div>
        </div>
        
        <div class="absolute bottom-0 left-0 w-full h-10 bg-[#fdf2f8]" style="border-radius: 50% 50% 0 0 / 100% 100% 0 0; transform: scaleX(1.5);"></div>
    </header>

    <main class="px-6 mt-4">
        <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="filterCategory('todos', this)" class="category-btn active border border-pink-200 text-pink-600 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">✨ Todos</button>
            <button onclick="filterCategory('pele', this)" class="category-btn border border-pink-200 text-pink-600 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">🧴 Pele</button>
            <button onclick="filterCategory('olhos', this)" class="category-btn border border-pink-200 text-pink-600 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">👁️ Olhos</button>
        </div>

        <div id="product-list" class="space-y-4">
            <div class="product-card bg-white p-3 rounded-3xl shadow-sm flex items-center border border-pink-50" data-name="base matte shop mix" data-category="pele">
                <img src="https://images.unsplash.com/photo-1596704017254-9b121068fb31?w=200" class="w-20 h-20 rounded-2xl object-cover bg-pink-50">
                <div class="ml-4 flex-1">
                    <h3 class="font-black text-sm text-gray-800">Base Matte</h3>
                    <p class="text-pink-600 font-bold text-xs mb-2">R$ 49,90</p>
                    <div class="flex gap-2">
                        <button onclick="openVideo('https://dm0qx8t0i9gc9.cloudfront.net/watermarks/video/fN5q9hM/vertical-stock-footage-glowing-face-makeup-of-young-beautiful-woman_v_0nd8s_n_watermark_hd.mp4')" class="p-2 bg-gray-100 rounded-xl text-xs"><i class="fa-solid fa-play"></i></button>
                        <button onclick="addToCart('Base Matte', 49.90)" class="flex-1 bg-pink-100 text-pink-700 text-[10px] font-black py-2 rounded-xl uppercase tracking-tighter">
                            + Adicionar
                        </button>
                    </div>
                </div>
            </div>

            <div class="product-card bg-white p-3 rounded-3xl shadow-sm flex items-center border border-pink-50" data-name="paleta de sombras" data-category="olhos">
                <img src="https://images.unsplash.com/photo-1512496011216-36838383838388?w=200" class="w-20 h-20 rounded-2xl object-cover bg-pink-50">
                <div class="ml-4 flex-1">
                    <h3 class="font-black text-sm text-gray-800">Paleta Sombras</h3>
                    <p class="text-pink-600 font-bold text-xs mb-2">R$ 35,00</p>
                    <div class="flex gap-2">
                        <button onclick="openVideo('...')" class="p-2 bg-gray-100 rounded-xl text-xs"><i class="fa-solid fa-play"></i></button>
                        <button onclick="addToCart('Paleta Sombras', 35.00)" class="flex-1 bg-pink-100 text-pink-700 text-[10px] font-black py-2 rounded-xl uppercase tracking-tighter">
                            + Adicionar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="cart-btn" class="fixed bottom-6 right-6 z-50 hidden">
        <button onclick="toggleCartModal()" class="pink-gradient text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center relative">
            <i class="fa-solid fa-cart-shopping text-xl"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-black text-white text-[10px] font-bold w-6 h-6 rounded-full flex items-center justify-center border-2 border-white">0</span>
        </button>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-gray-800">Meu Pedido</h2>
                <button onclick="toggleCartModal()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <div id="cart-items" class="space-y-4 mb-6">
                </div>
            <div class="border-t pt-4">
                <div class="flex justify-between font-black text-lg mb-6">
                    <span>Total:</span>
                    <span id="cart-total" class="text-pink-600">R$ 0,00</span>
                </div>
                <button onclick="sendWhatsApp()" class="w-full pink-gradient text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg">
                    Finalizar no WhatsApp
                </button>
            </div>
        </div>
    </div>

    <div id="videoModal" class="fixed inset-0 bg-black/95 hidden z-[70] flex items-center justify-center p-6">
        <button onclick="closeVideo()" class="absolute top-8 right-8 text-white text-4xl">&times;</button>
        <video id="modalVideo" class="w-full max-w-sm aspect-[9/16] rounded-3xl object-cover" controls playsinline></video>
    </div>

    <script>
        let cart = [];
        const WHATSAPP_NUMBER = '5516999999999'; // TROQUE PELO DELA

        function addToCart(name, price) {
            const index = cart.findIndex(item => item.name === name);
            if (index > -1) {
                cart[index].qty++;
            } else {
                cart.push({ name, price, qty: 1 });
            }
            updateCart();
            document.getElementById('cart-btn').classList.remove('hidden');
        }

        function updateCart() {
            const count = cart.reduce((acc, item) => acc + item.qty, 0);
            const total = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2)}`;
            
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl">
                    <div>
                        <p class="font-bold text-sm">${item.name}</p>
                        <p class="text-xs text-gray-500">${item.qty}x R$ ${item.price.toFixed(2)}</p>
                    </div>
                    <button onclick="removeFromCart(${i})" class="text-red-400 p-2"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
            
            if (count === 0) {
                document.getElementById('cart-btn').classList.add('hidden');
                toggleCartModal();
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function toggleCartModal() {
            document.getElementById('cart-modal').classList.toggle('hidden');
        }

        function filterProducts() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                card.classList.toggle('hidden', !name.includes(term));
            });
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                const cardCat = card.getAttribute('data-category');
                card.classList.toggle('hidden', cat !== 'todos' && cardCat !== cat);
            });
        }

        function sendWhatsApp() {
            let msg = "*Novo Pedido - Shop Mix*\n\n";
            cart.forEach(item => {
                msg += `✅ ${item.qty}x ${item.name} - R$ ${(item.price * item.qty).toFixed(2)}\n`;
            });
            msg += `\n*Total: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`);
        }

        function openVideo(url) {
            const v = document.getElementById('modalVideo');
            v.src = url;
            document.getElementById('videoModal').classList.remove('hidden');
            v.play();
        }

        function closeVideo() {
            document.getElementById('videoModal').classList.add('hidden');
            document.getElementById('modalVideo').pause();
        }
    </script>
</body>
</html>
