<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultoria Shop Mix Ipuã</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #fdf2f8; }
        
        /* O Rosa Premium que você escolheu */
        .pink-gradient { background: linear-gradient(135deg, #f472b6, #db2777); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        
        /* Botão de Filtro Ativo */
        .category-btn.active { 
            background: #db2777; 
            color: white; 
            border-color: #db2777; 
            box-shadow: 0 4px 12px rgba(219, 39, 119, 0.3);
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hidden { display: none; }
        
        /* Curva branca no final do header para suavizar a transição */
        .header-curve {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: #fdf2f8;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            transform: scaleX(1.5);
        }

        /* Destaque para o Logo Circular */
        .logo-ring {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            border: 4px solid white;
        }

        /* Animação de entrada dos cards */
        .product-card {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
    </style>
</head>
<body class="text-gray-900 mb-24">

    <header class="pink-gradient pt-14 pb-20 text-center relative overflow-hidden">
        <div class="header-curve"></div>
        
        <div class="logo-ring w-32 h-32 bg-black rounded-full mx-auto overflow-hidden mb-4 relative z-20 flex items-center justify-center">
            <img src="https://i.ibb.co/JMx6RKd/1000959503.jpg" 
                 alt="Logo Shopping Mix" 
                 class="w-full h-full object-cover">
        </div>
        
        <h1 class="text-white text-xl font-black uppercase tracking-widest relative z-20">Shopping Mix</h1>
        <p class="text-pink-100 text-[10px] font-bold tracking-[0.2em] uppercase relative z-20">Consultoria de Beleza • Ipuã</p>
    </header>

    <main class="px-6 -mt-8 relative z-30">
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <a href="https://wa.me/5516999999999?text=Oi! Vi seu catálogo digital e gostaria de uma consultoria personalizada." 
               class="glass p-4 rounded-3xl shadow-lg text-center border border-white flex flex-col items-center hover:scale-105 transition active:scale-95">
                <i class="fa-brands fa-whatsapp text-green-500 text-3xl mb-1"></i>
                <span class="text-[10px] font-black uppercase text-pink-800 tracking-tighter">Consultoria</span>
            </a>
            <a href="https://www.instagram.com/shopmixipua/" target="_blank"
               class="glass p-4 rounded-3xl shadow-lg text-center border border-white flex flex-col items-center hover:scale-105 transition active:scale-95">
                <i class="fa-brands fa-instagram text-pink-600 text-3xl mb-1"></i>
                <span class="text-[10px] font-black uppercase text-pink-800 tracking-tighter">Instagram</span>
            </a>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-4 mb-2 no-scrollbar">
            <button onclick="filterCategory('todos', this)" class="category-btn active border border-pink-200 text-pink-600 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">✨ Todos</button>
            <button onclick="filterCategory('pele', this)" class="category-btn border border-pink-200 text-pink-600 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">🧴 Pele</button>
            <button onclick="filterCategory('olhos', this)" class="category-btn border border-pink-200 text-pink-600 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">👁️ Olhos</button>
            <button onclick="filterCategory('perfume', this)" class="category-btn border border-pink-200 text-pink-600 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">🌸 Perfumes</button>
        </div>

        <div id="product-list" class="space-y-4">
            
            <div class="product-card bg-white p-3 rounded-3xl shadow-md flex items-center border border-pink-50" data-category="pele">
                <div class="w-20 h-20 rounded-2xl bg-pink-50 flex-shrink-0 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1596704017254-9b121068fb31?w=200" class="w-full h-full object-cover">
                </div>
                <div class="ml-4 flex-1">
                    <h3 class="font-black text-sm text-gray-800">Base Matte Shop Mix</h3>
                    <p class="text-[10px] text-pink-400 font-bold uppercase mb-2 italic tracking-tight">Dica: Sem Craquelar</p>
                    <div class="flex gap-2">
                        <button onclick="openVideo('https://dm0qx8t0i9gc9.cloudfront.net/watermarks/video/fN5q9hM/vertical-stock-footage-glowing-face-makeup-of-young-beautiful-woman_v_0nd8s_n_watermark_hd.mp4')" 
                                class="bg-gray-50 text-gray-700 text-[10px] font-black px-3 py-2 rounded-xl flex items-center gap-1 active:bg-gray-200">
                           <i class="fa-solid fa-play text-pink-600"></i> TUTORIAL
                        </button>
                        <a href="https://wa.me/5516999999999?text=Vi o vídeo da Base e quero saber o preço!" 
                           class="bg-pink-100 text-pink-700 text-[10px] font-black px-3 py-2 rounded-xl flex items-center gap-1 active:bg-pink-200">
                           <i class="fa-solid fa-cart-shopping"></i> QUERO
                        </a>
                    </div>
                </div>
            </div>

            <div class="product-card bg-white p-3 rounded-3xl shadow-md flex items-center border border-pink-50" data-category="olhos">
                <div class="w-20 h-20 rounded-2xl bg-pink-50 flex-shrink-0 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1512496011216-36838383838388?w=200" class="w-full h-full object-cover">
                </div>
                <div class="ml-4 flex-1">
                    <h3 class="font-black text-sm text-gray-800">Paleta de Sombras</h3>
                    <p class="text-[10px] text-pink-400 font-bold uppercase mb-2 italic tracking-tight">Olhar Marcante</p>
                    <div class="flex gap-2">
                        <button onclick="openVideo('https://dm0qx8t0i9gc9.cloudfront.net/watermarks/video/fN5q9hM/vertical-stock-footage-applying-brown-eyeshadow-makeup-on-model-eye_v_b_6f__e_watermark_hd.mp4')" 
                                class="bg-gray-50 text-gray-700 text-[10px] font-black px-3 py-2 rounded-xl flex items-center gap-1 active:bg-gray-200">
                           <i class="fa-solid fa-play text-pink-600"></i> TUTORIAL
                        </button>
                        <a href="https://wa.me/5516999999999?text=Vi o vídeo da paleta e quero garantir a minha!" 
                           class="bg-pink-100 text-pink-700 text-[10px] font-black px-3 py-2 rounded-xl flex items-center gap-1 active:bg-pink-200">
                           <i class="fa-solid fa-cart-shopping"></i> COMPRAR
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="videoModal" class="fixed inset-0 bg-black/95 hidden z-50 flex items-center justify-center p-6">
        <button onclick="closeVideo()" class="absolute top-8 right-8 text-white text-4xl font-light hover:text-pink-500 transition">×</button>
        <div class="w-full max-w-sm aspect-[9/16] bg-black rounded-3xl overflow-hidden shadow-2xl border border-white/10">
             <video id="modalVideo" class="w-full h-full object-cover" controls playsinline></video>
        </div>
    </div>

    <div class="fixed bottom-6 left-0 right-0 flex justify-center z-40 pointer-events-none">
        <a href="https://wa.me/5516999999999" class="pointer-events-auto pink-gradient text-white px-10 py-4 rounded-full shadow-2xl font-black text-sm uppercase tracking-widest flex items-center gap-3 active:scale-95 transition">
            <i class="fa-solid fa-wand-magic-sparkles"></i> Consultoria VIP
        </a>
    </div>

    <script>
        // Função para filtrar produtos por categoria
        function filterCategory(category, btn) {
            // Estilo visual dos botões de filtro
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Filtragem dos cards com animação simples
            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                if (category === 'todos' || card.getAttribute('data-category') === category) {
                    card.classList.remove('hidden');
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                } else {
                    card.classList.add('hidden');
                    card.style.opacity = '0';
                    card.style.transform = 'translateY(10px)';
                }
            });
        }

        // Funções para controlar o Player de Vídeo
        function openVideo(url) {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('modalVideo');
            video.src = url;
            modal.classList.remove('hidden');
            video.play();
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('modalVideo');
            video.pause();
            video.src = "";
            modal.classList.add('hidden');
        }
    </script>
</body>
</html>
